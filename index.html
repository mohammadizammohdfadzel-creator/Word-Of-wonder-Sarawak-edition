<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Word of Wonders: Sarawak Explorer</title>
    <style>
        :root { --primary: #fdb913; --secondary: #000000; --accent: #d82c2c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #fdb913 0%, #d82c2c 50%, #000000 100%); }
        .card { background: rgba(255, 255, 255, 0.95); padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 90%; max-width: 450px; text-align: center; backdrop-filter: blur(10px); }
        input { width: 85%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; }
        button { padding: 12px 25px; background: var(--primary); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #e6a800; transform: scale(1.05); }
        #game-screen, #leaderboard-screen { display: none; }
        .score-board { font-size: 1.2rem; font-weight: bold; color: var(--accent); }
    </style>
</head>
<body>

<div id="login-screen" class="card">
    <h2>Sarawak Explorer</h2>
    <p>Uji pengetahuan anda tentang Bumi Kenyalang!</p>
    <input type="text" id="username" placeholder="Nama Anda">
    <input type="email" id="email" placeholder="E-mel Anda">
    <br><button onclick="startGame()">Mula Cabaran</button>
</div>

<div id="game-screen" class="card">
    <div class="score-board" id="score-display">Markah: 0</div>
    <p id="question" style="font-size: 1.1rem; margin: 20px 0;"></p>
    <div id="word-display" style="font-size: 2rem; letter-spacing: 4px; font-weight: bold;"></div>
    <input type="text" id="answer-input" placeholder="Taip jawapan..." autocomplete="off">
    <br><button onclick="checkAnswer()">Hantar</button>
</div>

<div id="leaderboard-screen" class="card">
    <h2>Papan Pendahulu</h2>
    <div id="scores" style="text-align: left; margin: 20px 0;"></div>
    <button onclick="location.reload()">Main Semula</button>
</div>

<script>
    const data = [
        { q: "Nama bunga pakma terbesar yang ditemui di Sarawak?", a: "RAFFLESIA" },
        { q: "Siapakah 'White Rajah' pertama Sarawak?", a: "JAMESBROOKE" },
        { q: "Nama gua yang mempunyai ruang bawah tanah terbesar di dunia?", a: "SARAWAKCHAMBER" },
        { q: "Haiwan primat endemik Borneo yang berhidung besar?", a: "BEKANTAN" },
        { q: "Nama pokok yang kulitnya digunakan untuk membuat tikar tradisional?", a: "BEMBAN" },
        { q: "Gunung tertinggi di Sarawak?", a: "MURUD" },
        { q: "Apakah nama tarian tradisional kaum Melanau menggunakan dua batang buluh?", a: "MAGUNATIP" },
        { q: "Taman Negara yang terkenal dengan formasi batu tajam?", a: "MULU" }
    ];

    let currentLevel = 0;
    let score = 0;
    let shuffledData = data.sort(() => Math.random() - 0.5);

    function startGame() {
        if(!document.getElementById('username').value) return alert("Sila masukkan nama!");
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        loadQuestion();
    }

    function loadQuestion() {
        if(currentLevel < shuffledData.length) {
            document.getElementById('question').innerText = shuffledData[currentLevel].q;
            document.getElementById('word-display').innerText = "_".repeat(shuffledData[currentLevel].a.length);
            document.getElementById('answer-input').value = "";
        } else {
            finishGame();
        }
    }

    function checkAnswer() {
        const input = document.getElementById('answer-input').value.toUpperCase().replace(/\s/g, '');
        if(input === shuffledData[currentLevel].a) {
            score += 100;
            document.getElementById('score-display').innerText = "Markah: " + score;
            currentLevel++;
            loadQuestion();
        } else {
            alert("Salah! Cuba lagi.");
        }
    }

    function finishGame() {
        const name = document.getElementById('username').value;
        let players = JSON.parse(localStorage.getItem('sarawakScores')) || [];
        players.push({ name, score });
        localStorage.setItem('sarawakScores', JSON.stringify(players));
        
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('leaderboard-screen').style.display = 'block';
        
        let html = "<ul>";
        players.sort((a,b) => b.score - a.score).forEach(p => {
            html += `<li>${p.name}: <b>${p.score}</b></li>`;
        });
        document.getElementById('scores').innerHTML = html + "</ul>";
    }
</script>
</body>
</html>
