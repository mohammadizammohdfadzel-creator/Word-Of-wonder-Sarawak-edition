<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Word of Wonders: Sarawak Explorer</title>
    <style>
        /* Tetapan asas */
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* Background Layer khas agar gambar sentiasa bertukar */
        #bg-layer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-size: cover; background-position: center;
            transition: background-image 1s ease-in-out;
            z-index: -1;
        }

        .container {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw;
        }

        .card { 
            background: rgba(255, 255, 255, 0.85); padding: 30px; 
            border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            width: 90%; max-width: 500px; text-align: center;
            backdrop-filter: blur(10px); border: 1px solid white;
        }

        .box-container { display: flex; justify-content: center; gap: 8px; margin: 20px 0; }
        .letter-box { 
            width: 45px; height: 50px; border: 2px solid #333; 
            text-align: center; font-size: 1.5rem; font-weight: bold; 
            text-transform: uppercase; background: white; border-radius: 5px;
        }

        button { 
            padding: 12px 30px; background: #d82c2c; color: white; 
            border: none; border-radius: 50px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="bg-layer"></div>

<div class="container">
    <div id="game-card" class="card">
        <h2 id="title">Sarawak Wonders</h2>
        <div id="content">
            <input type="text" id="username" placeholder="Nama Anda" style="padding:10px; width:80%; margin-bottom:10px;"><br>
            <button onclick="startGame()">Mula Sekarang</button>
        </div>
    </div>
</div>

<script>
    const questions = [
        { q: "Burung ikonik Sarawak?", a: "KENYALANG", img: "https://images.unsplash.com/photo-1549668273-356499878170?w=1200" },
        { q: "Ibu negeri Sarawak?", a: "KUCHING", img: "https://images.unsplash.com/photo-1589782182703-2aaa69037b5b?w=1200" },
        { q: "Gua terbesar di dunia di Mulu?", a: "SARAWAKCHAMBER", img: "https://images.unsplash.com/photo-1505322022379-7cbea3536d88?w=1200" }
    ];

    let currentLevel = 0;

    function startGame() {
        if(!document.getElementById('username').value) return alert("Masukkan nama!");
        loadQuestion();
    }

    function loadQuestion() {
        const item = questions[currentLevel];
        // Tukar gambar pada lapisan khas
        document.getElementById('bg-layer').style.backgroundImage = `url('${item.img}')`;
        
        document.getElementById('content').innerHTML = `
            <p style="font-size:1.2rem; font-weight:bold;">${item.q}</p>
            <div class="box-container" id="box-container"></div>
            <button onclick="checkAnswer()">Semak Jawapan</button>
        `;

        const container = document.getElementById('box-container');
        for(let i = 0; i < item.a.length; i++) {
            container.innerHTML += `<input type="text" maxlength="1" class="letter-box">`;
        }
    }

    function checkAnswer() {
        const boxes = document.querySelectorAll('.letter-box');
        let val = "";
        boxes.forEach(b => val += b.value.toUpperCase());
        
        if(val === questions[currentLevel].a) {
            currentLevel++;
            if(currentLevel < questions.length) loadQuestion();
            else alert("Tahniah, anda menang!");
        } else {
            alert("Salah, cuba lagi!");
        }
    }
</script>
</body>
</html>
