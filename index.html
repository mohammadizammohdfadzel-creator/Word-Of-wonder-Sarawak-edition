<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Word of Wonders: Sarawak Explorer</title>
    <style>
        :root { --primary: #fdb913; --secondary: #000000; --glass: rgba(255, 255, 255, 0.85); }
        
        body { 
            font-family: 'Segoe UI', sans-serif; margin: 0; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; 
            /* Transition untuk pertukaran gambar */
            transition: background 0.8s ease-in-out;
            background-size: cover;
            background-position: center;
        }

        .card { 
            background: var(--glass); padding: 2rem; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 450px; 
            text-align: center; backdrop-filter: blur(10px);
        }

        input { width: 85%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; }
        button { padding: 12px 25px; background: var(--primary); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }
        
        #game-screen, #leaderboard-screen { display: none; }
    </style>
</head>
<body>

<div id="login-screen" class="card">
    <h2>Sarawak Explorer</h2>
    <input type="text" id="username" placeholder="Nama Anda">
    <input type="email" id="email" placeholder="E-mel Anda">
    <br><button onclick="startGame()">Mula Cabaran</button>
</div>

<div id="game-screen" class="card">
    <div id="score-display" style="font-weight:bold; color:red;">Markah: 0</div>
    <p id="question" style="font-size: 1.2rem; margin: 20px 0; font-weight: bold;"></p>
    <div id="word-display" style="font-size: 1.8rem; letter-spacing: 3px; margin: 10px;"></div>
    <input type="text" id="answer-input" placeholder="Taip jawapan..." autocomplete="off">
    <br><button onclick="checkAnswer()">Hantar</button>
</div>

<div id="leaderboard-screen" class="card">
    <h2>Papan Pendahulu</h2>
    <div id="scores" style="text-align: left; margin: 20px 0;"></div>
    <button onclick="location.reload()">Main Lagi</button>
</div>

<script>
    // Soalan dengan keyword untuk gambar latar belakang
    const data = [
        { q: "Burung ikonik Sarawak?", a: "KENYALANG", img: "hornbill,sarawak,bird" },
        { q: "Ibu negeri Sarawak?", a: "KUCHING", img: "kuching,city,sarawak" },
        { q: "Haiwan primat yang terkenal di Semenggoh?", a: "ORANGUTAN", img: "orangutan,borneo,forest" },
        { q: "Gua dengan ruang bawah tanah terbesar di dunia?", a: "SARAWAKCHAMBER", img: "mulu,cave,sarawak" },
        { q: "Bunga terbesar di dunia di hutan Sarawak?", a: "RAFFLESIA", img: "rafflesia,flower,nature" },
        { q: "Gunung tertinggi di Sarawak?", a: "MURUD", img: "mountain,sarawak,nature" }
    ];

    let currentLevel = 0;
    let score = 0;

    function updateBackground(keyword) {
        // Menggunakan Unsplash Source untuk gambar rawak yang berkualiti
        document.body.style.backgroundImage = `url('https://source.unsplash.com/1600x900/?${keyword}')`;
    }

    function startGame() {
        if(!document.getElementById('username').value) return alert("Sila masukkan nama!");
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        updateBackground("sarawak,landscape");
        loadQuestion();
    }

    function loadQuestion() {
        if(currentLevel < data.length) {
            document.getElementById('question').innerText = data[currentLevel].q;
            document.getElementById('word-display').innerText = "_".repeat(data[currentLevel].a.length);
            document.getElementById('answer-input').value = "";
            updateBackground(data[currentLevel].img);
        } else {
            finishGame();
        }
    }

    function checkAnswer() {
        const input = document.getElementById('answer-input').value.toUpperCase().replace(/\s/g, '');
        if(input === data[currentLevel].a) {
            score += 100;
            document.getElementById('score-display').innerText = "Markah: " + score;
            currentLevel++;
            loadQuestion();
        } else {
            alert("Oops! Cuba lagi.");
        }
    }

    function finishGame() {
        document.body.style.backgroundImage = "none";
        document.body.style.backgroundColor = "#333";
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('leaderboard-screen').style.display = 'block';
        // Simpan logic skor di sini...
    }
</script>
</body>
</html>
